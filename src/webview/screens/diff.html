<div id="diffScreen" class="hidden">
  <div class="header">
    <h2>Preparing Review</h2>
  </div>
  <p class="description">
    Reading your staged git diff and preparing context for analysis.
  </p>
  <div class="diff-summary">
    <div class="section-title">Git Diff</div>
    <p>Command: <code>git diff --cached</code></p>
    <p id="diffMeta">Only staged changes will be reviewed.</p>
    <p id="diffStats">Files: 0 | +0 | -0</p>
  </div>
  <div id="diffFilesList" class="diff-files-list">
    <p class="empty-diff">No staged diff loaded.</p>
  </div>
  <div class="action-row">
    <button id="cancelReview" class="secondary-button">Go Back</button>
    <button id="proceedReview">Proceed</button>
  </div>
</div>
