<div id="overviewScreen" class="hidden">
  <div class="header">
    <h2>Review Results</h2>
  </div>
  <p class="description">
    AI-generated overview of your staged changes.
  </p>

  <div class="ai-overview-card">
    <div class="section-title">AI Overview</div>
    <div id="overviewMarkdown" class="overview-markdown">Waiting for AI result...</div>
  </div>

  <div class="ai-overview-card">
    <div class="section-title">Context7 Usage</div>
    <p id="context7Status" class="context7-status">Context7 status is not available yet.</p>
    <ul id="context7Sources" class="context7-sources hidden"></ul>
  </div>

  <div class="diff-summary">
    <div class="section-title">Git Diff</div>
    <p id="overviewDiffStats">Files: 0 | +0 | -0</p>
  </div>

  <details class="expandable-section">
    <summary>Show Git Diff</summary>
    <div id="overviewDiffFilesList" class="diff-files-list">
      <p class="empty-diff">No staged diff loaded.</p>
    </div>
  </details>

  <button id="overviewGoBack" class="secondary-button">Go Back</button>
</div>
